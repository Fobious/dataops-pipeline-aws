version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
      nodejs: 20
    commands:
      - echo "Instalando AWS CDK..."
      - npm install -g aws-cdk
      - echo "Instalando dependencias Python do CDK..."
      - cd infrastructure
      - pip install -r requirements.txt

  pre_build:
    commands:
      - echo "Validando versoes..."
      - python --version
      - node --version
      - npm --version
      - cdk --version
      - echo "Executando cdk synth..."
      - cdk synth

  build:
    commands:
      - echo "Executando deploy automatico via CDK..."
      - cdk deploy --require-approval never

  post_build:
    commands:
      - echo "Deploy finalizado com sucesso."